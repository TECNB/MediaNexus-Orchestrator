server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: medianexus-orchestrator
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MEDIANEXUS_DB_URL:jdbc:mysql://127.0.0.1:3307/medianexus_orchestrator?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${MEDIANEXUS_DB_USERNAME:root}
    password: ${MEDIANEXUS_DB_PASSWORD:}
    hikari:
      pool-name: MediaNexusHikariPool
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: ${MEDIANEXUS_DB_CONNECTION_TIMEOUT:5000}
      initialization-fail-timeout: ${MEDIANEXUS_DB_INITIALIZATION_FAIL_TIMEOUT:10000}

medianexus:
  datasource:
    ssh-tunnel:
      enabled: ${MEDIANEXUS_DB_SSH_TUNNEL_ENABLED:false}
      host: ${MEDIANEXUS_DB_SSH_HOST:}
      port: ${MEDIANEXUS_DB_SSH_PORT:22}
      username: ${MEDIANEXUS_DB_SSH_USERNAME:}
      password: ${MEDIANEXUS_DB_SSH_PASSWORD:}
      local-host: ${MEDIANEXUS_DB_SSH_LOCAL_HOST:127.0.0.1}
      local-port: ${MEDIANEXUS_DB_LOCAL_PORT:3307}
      remote-host: ${MEDIANEXUS_DB_SSH_REMOTE_HOST:127.0.0.1}
      remote-port: ${MEDIANEXUS_DB_SSH_REMOTE_PORT:3306}
      strict-host-key-checking: ${MEDIANEXUS_DB_SSH_STRICT_HOST_KEY_CHECKING:false}
      connect-timeout: ${MEDIANEXUS_DB_SSH_CONNECT_TIMEOUT:15s}
  ani-rss:
    base-url: ${MEDIANEXUS_ANI_RSS_BASE_URL:http://example.invalid:7789}
    api-key: ${MEDIANEXUS_ANI_RSS_API_KEY:}
    timeout: ${MEDIANEXUS_ANI_RSS_TIMEOUT:10s}
  autosymlink:
    base-url: ${MEDIANEXUS_AUTOSYMLINK_BASE_URL:}
    cookie: ${MEDIANEXUS_AUTOSYMLINK_COOKIE:}
    timeout: ${MEDIANEXUS_AUTOSYMLINK_TIMEOUT:15s}
    max-attempts: ${MEDIANEXUS_AUTOSYMLINK_MAX_ATTEMPTS:2}
    retry-interval: ${MEDIANEXUS_AUTOSYMLINK_RETRY_INTERVAL:3s}
    movie:
      uuid: ${MEDIANEXUS_AUTOSYMLINK_MOVIE_TASK_UUID:}
      request-body-json: ${MEDIANEXUS_AUTOSYMLINK_MOVIE_REQUEST_BODY_JSON:}
    tv:
      uuid: ${MEDIANEXUS_AUTOSYMLINK_TV_TASK_UUID:}
      request-body-json: ${MEDIANEXUS_AUTOSYMLINK_TV_REQUEST_BODY_JSON:}
    anime:
      uuid: ${MEDIANEXUS_AUTOSYMLINK_ANIME_TASK_UUID:}
      request-body-json: ${MEDIANEXUS_AUTOSYMLINK_ANIME_REQUEST_BODY_JSON:}
    adult:
      uuid: ${MEDIANEXUS_AUTOSYMLINK_ADULT_TASK_UUID:}
      request-body-json: ${MEDIANEXUS_AUTOSYMLINK_ADULT_REQUEST_BODY_JSON:}
  emby:
    base-url: ${MEDIANEXUS_EMBY_BASE_URL:}
    api-key: ${MEDIANEXUS_EMBY_API_KEY:}
    webhook-secret: ${MEDIANEXUS_EMBY_WEBHOOK_SECRET:}
    timeout: ${MEDIANEXUS_EMBY_TIMEOUT:5s}
    metadata-cache-ttl: ${MEDIANEXUS_EMBY_METADATA_CACHE_TTL:12h}
  openlist:
    base-url: ${MEDIANEXUS_OPENLIST_BASE_URL:}
    authorization: ${MEDIANEXUS_OPENLIST_AUTHORIZATION:}
    offline-tool: ${MEDIANEXUS_OPENLIST_OFFLINE_TOOL:PikPak}
    ed2k-offline-tool: ${MEDIANEXUS_OPENLIST_ED2K_OFFLINE_TOOL:Thunder}
    delete-policy: ${MEDIANEXUS_OPENLIST_DELETE_POLICY:delete_on_upload_succeed}
    anime-path-template: ${MEDIANEXUS_ANIME_PATH_TEMPLATE:/pikpak/Media/Anime/{themoviedbName}/Season {season}}
    movie-root-path: ${MEDIANEXUS_OPENLIST_MOVIE_ROOT_PATH:}
    tv-root-path: ${MEDIANEXUS_OPENLIST_TV_ROOT_PATH:}
    adult-root-path: ${MEDIANEXUS_OPENLIST_ADULT_ROOT_PATH:}
    anime-rename-template: ${MEDIANEXUS_ANIME_RENAME_TEMPLATE:{title} S{seasonFormat}E{episodeFormat}}
    anime-exclude-patterns: ${MEDIANEXUS_ANIME_EXCLUDE_PATTERNS:特别篇,\d-\d,总集}
    timeout: ${MEDIANEXUS_OPENLIST_TIMEOUT:120s}
    poll-interval: ${MEDIANEXUS_OPENLIST_POLL_INTERVAL:10s}
    offline-timeout: ${MEDIANEXUS_OPENLIST_OFFLINE_TIMEOUT:10m}
    adult-offline-timeout: ${MEDIANEXUS_ADULT_OPENLIST_OFFLINE_TIMEOUT:2m}
    retry-limit: ${MEDIANEXUS_OPENLIST_RETRY_LIMIT:5}
  subtitle-upload:
    allowed-extensions: ${MEDIANEXUS_SUBTITLE_UPLOAD_ALLOWED_EXTENSIONS:.ass,.srt,.sup}
    max-upload-size: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_UPLOAD_SIZE:50MB}
    max-entry-count: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_ENTRY_COUNT:100}
    max-text-subtitle-size: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_TEXT_SUBTITLE_SIZE:10MB}
    max-sup-size: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_SUP_SIZE:50MB}
    max-total-extracted-size: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_TOTAL_EXTRACTED_SIZE:150MB}
    max-compression-ratio: ${MEDIANEXUS_SUBTITLE_UPLOAD_MAX_COMPRESSION_RATIO:100}
  prowlarr:
    base-url: ${MEDIANEXUS_PROWLARR_BASE_URL:}
    api-key: ${MEDIANEXUS_PROWLARR_API_KEY:}
    timeout: ${MEDIANEXUS_PROWLARR_TIMEOUT:30s}
  radarr:
    scheme: ${MEDIANEXUS_RADARR_SCHEME:http}
    host: ${MEDIANEXUS_RADARR_HOST:}
    port: ${MEDIANEXUS_RADARR_PORT:0}
    api-key: ${MEDIANEXUS_RADARR_API_KEY:}
    timeout: ${MEDIANEXUS_RADARR_TIMEOUT:10s}
  sonarr:
    scheme: ${MEDIANEXUS_SONARR_SCHEME:http}
    host: ${MEDIANEXUS_SONARR_HOST:}
    port: ${MEDIANEXUS_SONARR_PORT:0}
    api-key: ${MEDIANEXUS_SONARR_API_KEY:}
    timeout: ${MEDIANEXUS_SONARR_TIMEOUT:10s}
  tmdb:
    base-url: ${MEDIANEXUS_TMDB_BASE_URL:https://api.themoviedb.org/3}
    api-token: ${MEDIANEXUS_TMDB_API_TOKEN:}
    default-language: ${MEDIANEXUS_TMDB_DEFAULT_LANGUAGE:zh-CN}
    fallback-language: ${MEDIANEXUS_TMDB_FALLBACK_LANGUAGE:en-US}
    image-base-url: ${MEDIANEXUS_TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/w500}
    fallback-to-sonarr: ${MEDIANEXUS_TMDB_FALLBACK_TO_SONARR:true}
    timeout: ${MEDIANEXUS_TMDB_TIMEOUT:10s}
  auth:
    registration-code: ${MEDIANEXUS_AUTH_REGISTRATION_CODE:}
  quota:
    daily-content-create-limit: ${MEDIANEXUS_DAILY_CONTENT_CREATE_LIMIT:3}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.medianexus.orchestrator
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-read-body: false
  is-read-header: true
  is-read-cookie: false
  token-style: uuid
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod | production

knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
